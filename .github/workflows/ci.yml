name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Run frontend lint
        run: make frontend-lint

  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Run frontend type check
        run: make frontend-typecheck

  frontend-test:
    name: Frontend tests (vitest + coverage)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Run frontend tests with coverage
        run: make frontend-test

  frontend-build:
    name: Frontend build (vite)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Build frontend
        run: make frontend-build

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Ruff check
        run: make lint

  typecheck:
    name: Type check (ty)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Ty check
        run: make typecheck

  test:
    name: Tests (pytest, ${{ matrix.slice.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        slice:
          - name: unit
          - name: integration-core
          - name: integration-bridge
          - name: e2e
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Run tests
        run: make test-${{ matrix.slice.name }}

  test-postgres:
    name: Tests (pytest, PostgreSQL)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codex_lb
          POSTGRES_PASSWORD: codex_lb
          POSTGRES_DB: codex_lb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codex_lb -d codex_lb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CODEX_LB_TEST_DATABASE_URL: postgresql+asyncpg://codex_lb:codex_lb@127.0.0.1:5432/codex_lb
      PYTHONFAULTHANDLER: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Run tests
        run: make test-postgres

  migration-check:
    name: Migration check (alembic)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Validate migration policy and drift
        run: make migration-check

  migration-check-postgres:
    name: Migration check (alembic, PostgreSQL)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codex_lb
          POSTGRES_PASSWORD: codex_lb
          POSTGRES_DB: codex_lb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codex_lb -d codex_lb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Validate migration policy and drift on PostgreSQL
        run: make migration-check-postgres

  package:
    name: Package (build)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Build and verify package
        run: make package

  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: codex-lb:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: codex-lb:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: trivy-results.sarif
          # Keep PR and main uploads in the same CI category so Code Scanning
          # can compare pull-request alerts against the default-branch baseline.
          category: .github/workflows/ci.yml:docker

      - name: Enforce Trivy high-severity gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: codex-lb:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  helm-lint:
    name: Helm lint + template + kubeconform
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="0.7.0"
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; fi
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-${OS}-${ARCH}.tar.gz" \
            | tar xz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Helm lint + template + kubeconform
        run: make helm-check

  helm-smoke-kind:
    name: Helm smoke install (kind)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Helm smoke install
        run: make helm-smoke-kind
